# fly.toml — Rivers Real Estate platform
#
# Edit `app` to your chosen Fly.io app name (must be globally unique).
# Set up the persistent volume once with:
#   fly volumes create rivers_data --region sea --size 1
# Then deploy with:
#   fly deploy

app = "luxury-homes-calgary"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  # DB_PATH is set inside the Dockerfile to /data/rivers.db, which is the
  # mount point of the persistent volume below.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/public/stats"

[[mounts]]
  source = "rivers_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
